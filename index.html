<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixi → Skia CanvasKit — Side-by-Side</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a12;
        color: #e0e0e0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 16px;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
      }

      #status {
        font-size: 14px;
        opacity: 0.7;
        letter-spacing: 0.02em;
      }

      /* ── Side-by-side layout ── */
      #canvas-row {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-start;
        justify-content: center;
        width: 100%;
        max-width: 1336px;
      }

      .canvas-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1 1 calc((100% - 16px) / 2);
        gap: 10px;
        min-width: 0;
        max-width: 660px;
      }

      .canvas-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.5;
      }

      #pixi-canvas,
      #skia-canvas {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }

      /* ── Buttons ── */
      #btn-row {
        display: flex;
        gap: 16px;
        justify-content: center;
      }

      #btn-row button {
        padding: 10px 24px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        color: #e0e0e0;
        font-family: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      #btn-row button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.3);
      }

      #btn-row button:active:not(:disabled) {
        background: rgba(255, 255, 255, 0.18);
      }

      #btn-row button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
